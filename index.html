<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>France · 2026 World Cup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      min-height: 100vh;
      background-image: url('background.png');
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,5,25,0.80) 0%, rgba(0,8,30,0.72) 50%, rgba(0,4,18,0.86) 100%);
      z-index: 0;
    }
    .content { position: relative; z-index: 1; }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .tricolor {
      background: linear-gradient(to right, #002395 33.33%, #fff 33.33%, #fff 66.66%, #ED2939 66.66%);
    }
    .pill-green  { background: rgba(34,197,94,0.18);  border: 1px solid rgba(34,197,94,0.35);  color: #86efac; }
    .pill-yellow { background: rgba(234,179,8,0.18);  border: 1px solid rgba(234,179,8,0.35);  color: #fde047; }
    .pill-red    { background: rgba(239,68,68,0.18);  border: 1px solid rgba(239,68,68,0.35);  color: #fca5a5; }
    .row-france  { border-left: 2px solid #6B9FFF; padding-left: 6px; margin-left: -8px; }
  </style>
</head>
<body>
<div class="content max-w-5xl mx-auto px-4 py-10">

  <!-- Header -->
  <header class="mb-10">
    <div class="h-[3px] tricolor rounded-full w-20 mb-8"></div>
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="text-white/40 text-xs uppercase tracking-[0.22em] mb-2">2026 FIFA World Cup</p>
        <h1 class="text-white text-6xl font-black tracking-tight leading-none">FRANCE</h1>
        <p class="text-white/35 text-sm mt-1 tracking-widest uppercase">Les Bleus</p>
      </div>
      <div id="status-block" class="glass rounded-xl px-5 py-3 text-right">
        <p class="text-white/35 text-xs uppercase tracking-wider mb-1">Current Standing</p>
        <p id="status-line" class="text-white font-bold text-base">Loading…</p>
      </div>
    </div>
  </header>

  <!-- Top grid: Next Match (wide) + Standings (narrow) -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-5">

    <!-- What's Next -->
    <div class="lg:col-span-2">
      <p class="text-white/35 text-xs uppercase tracking-[0.18em] mb-3">What's Next</p>
      <div id="next-match" class="glass rounded-2xl p-7 min-h-[140px] flex items-center">
        <p class="text-white/30 italic">Loading…</p>
      </div>
    </div>

    <!-- Standings -->
    <div>
      <p class="text-white/35 text-xs uppercase tracking-[0.18em] mb-3">Group Standings</p>
      <div id="standings" class="glass rounded-2xl p-5 min-h-[140px]">
        <p class="text-white/30 italic">Loading…</p>
      </div>
    </div>
  </div>

  <!-- Bottom grid: Results + Watch For -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

    <!-- Results -->
    <div class="lg:col-span-2">
      <p class="text-white/35 text-xs uppercase tracking-[0.18em] mb-3">France's Results</p>
      <div id="results" class="space-y-2">
        <div class="glass rounded-2xl p-5"><p class="text-white/30 italic">Loading…</p></div>
      </div>
    </div>

    <!-- Watch For -->
    <div>
      <p class="text-white/35 text-xs uppercase tracking-[0.18em] mb-3">Watch For</p>
      <div id="watch-for" class="glass rounded-2xl p-5">
        <p class="text-white/30 italic">Loading…</p>
      </div>
    </div>
  </div>

  <footer class="mt-14 text-center">
    <div class="h-px tricolor max-w-[80px] mx-auto mb-4 opacity-40"></div>
    <p class="text-white/20 text-xs tracking-wider">Live data · Refreshes on load</p>
  </footer>
</div>

<script>
  const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';
  const ESPN_BOARD     = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
  // France's confirmed Group I match dates — fetch each day individually (range query unreliable in browser)
  const FRANCE_DATES   = ['20260616', '20260622', '20260626'];

  async function init() {
    try {
      const fetches = await Promise.allSettled([
        fetch(ESPN_STANDINGS).then(r => r.json()),
        ...FRANCE_DATES.map(d => fetch(`${ESPN_BOARD}?dates=${d}`).then(r => r.json()))
      ]);

      const standings  = fetches[0].status === 'fulfilled' ? fetches[0].value : null;
      const allEvents  = fetches.slice(1)
        .filter(r => r.status === 'fulfilled')
        .flatMap(r => (r.value?.events || []).filter(e =>
          e.competitions?.[0]?.competitors?.some(c => isFrance(c.team?.displayName))
        ));

      render(standings, allEvents);
    } catch (e) {
      console.error(e);
      showError();
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function isFrance(name) { return (name || '').toLowerCase().includes('france'); }

  function findFranceGroup(standings) {
    for (const group of (standings?.children || [])) {
      if (group.standings?.entries?.some(e => isFrance(e.team?.displayName))) return group;
    }
    return null;
  }

  // ESPN uses abbreviations: GP=played, W=wins, D=draws(ties), L=losses, P=points, R=rank, GD=goal diff
  function getStat(entry, abbr) {
    const s = entry?.stats?.find(s => s.abbreviation === abbr);
    return s != null ? (parseInt(s.value) || 0) : 0;
  }

  function franceComp(event) {
    return event.competitions?.[0]?.competitors?.find(c => isFrance(c.team?.displayName));
  }

  function opponentIn(event) {
    return event.competitions?.[0]?.competitors?.find(c => !isFrance(c.team?.displayName));
  }

  // ESPN scoreboard returns score as a plain integer; team schedule returns {value, displayValue, winner}
  function scoreVal(comp) {
    const s = comp?.score;
    if (s == null) return null;
    if (typeof s === 'object') return s.displayValue ?? String(s.value ?? '');
    return String(s);
  }

  function isWinner(comp) {
    const s = comp?.score;
    if (s == null) return null;
    if (typeof s === 'object') return s.winner ?? null;
    return null; // plain integer — no winner flag available
  }

  function isCompleted(event) {
    const completed = event.status?.type?.completed;
    if (completed === true)  return true;
    if (completed === false) return false;
    // Fallback: past events without a status field
    return event.date ? new Date(event.date) < new Date() : false;
  }

  function resultOf(event) {
    if (!isCompleted(event)) return null;
    const fc  = franceComp(event);
    const opp = opponentIn(event);
    if (!fc || !opp) return null;
    // Use winner flag if available (team schedule endpoint)
    const won = isWinner(fc);
    if (won === true)  return 'win';
    if (won === false) return isWinner(opp) === true ? 'loss' : 'draw';
    // Fall back to score comparison (scoreboard endpoint — plain integers)
    const fs = typeof fc.score  === 'object' ? fc.score?.value  : fc.score;
    const os = typeof opp.score === 'object' ? opp.score?.value : opp.score;
    if (fs == null || os == null) return null;
    if (fs > os) return 'win';
    if (fs < os) return 'loss';
    return 'draw';
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render(standings, allEvents) {
    const group   = findFranceGroup(standings);
    const entries = group?.standings?.entries || [];

    const played   = allEvents.filter(e =>  isCompleted(e));
    const upcoming = allEvents.filter(e => !isCompleted(e));

    renderStatus(entries);
    renderNextMatch(upcoming);
    renderResults(played);
    renderStandings(entries);
    renderWatchFor(entries, upcoming);
  }

  function renderStatus(entries) {
    const fr = entries.find(e => isFrance(e.team?.displayName));
    if (!fr) { document.getElementById('status-line').textContent = 'Data unavailable'; return; }

    const rank = getStat(fr, 'R') || entries.indexOf(fr) + 1;
    const pts  = getStat(fr, 'P');
    const gp   = getStat(fr, 'GP');
    const sfx  = ['st','nd','rd'][rank - 1] || 'th';
    const note = rank <= 2 ? '· On track to advance' : '· Outside automatic spots';

    document.getElementById('status-line').textContent =
      `${rank}${sfx} in group · ${pts} pt${pts !== 1 ? 's' : ''} from ${gp} game${gp !== 1 ? 's' : ''} ${note}`;
  }

  function renderNextMatch(upcoming) {
    const el = document.getElementById('next-match');
    if (!upcoming.length) {
      el.innerHTML = `<p class="text-white/50">No upcoming group matches — group stage may be complete.</p>`;
      return;
    }

    const ev   = upcoming[0];
    const comp = ev.competitions?.[0];
    const home = comp?.competitors?.find(c => c.homeAway === 'home');
    const away = comp?.competitors?.find(c => c.homeAway === 'away');
    const opp  = opponentIn(ev);
    const fr   = franceComp(ev);
    const isHome = fr?.homeAway === 'home';
    const venue  = comp?.venue?.fullName || '';
    const city   = comp?.venue?.address?.city || '';

    el.innerHTML = `
      <div class="flex flex-wrap items-center gap-8 w-full">
        <div class="flex items-center gap-5">
          <div class="text-center">
            ${home?.team?.logos?.[0]?.href
              ? `<img src="${home.team.logos[0].href}" class="w-14 h-14 object-contain mx-auto mb-1">`
              : `<div class="w-14 h-14 mx-auto mb-1 flex items-center justify-center text-3xl">${isHome ? '🇫🇷' : '⚽'}</div>`}
            <p class="text-white/55 text-xs font-semibold">${home?.team?.abbreviation || '—'}</p>
          </div>
          <span class="text-white/20 text-xs uppercase tracking-[0.2em]">vs</span>
          <div class="text-center">
            ${away?.team?.logos?.[0]?.href
              ? `<img src="${away.team.logos[0].href}" class="w-14 h-14 object-contain mx-auto mb-1">`
              : `<div class="w-14 h-14 mx-auto mb-1 flex items-center justify-center text-3xl">${!isHome ? '🇫🇷' : '⚽'}</div>`}
            <p class="text-white/55 text-xs font-semibold">${away?.team?.abbreviation || '—'}</p>
          </div>
        </div>

        <div class="flex-1 min-w-0">
          <p class="text-white font-semibold text-lg leading-tight">France vs ${opp?.team?.displayName || 'TBD'}</p>
          <p class="text-white/50 text-sm mt-1">${fmtDate(ev.date)}</p>
          <p class="text-white/30 text-xs mt-0.5">${fmtTime(ev.date)}</p>
          ${venue ? `<p class="text-white/25 text-xs mt-2">📍 ${venue}${city ? `, ${city}` : ''}</p>` : ''}
        </div>

        <div class="text-right flex-shrink-0">
          <span class="inline-block px-3 py-1 rounded-full bg-white/10 text-white/50 text-xs border border-white/10">
            Group stage
          </span>
        </div>
      </div>
    `;
  }

  function renderResults(played) {
    const el = document.getElementById('results');
    if (!played.length) {
      el.innerHTML = `<div class="glass rounded-xl p-5"><p class="text-white/35 italic">No completed matches yet.</p></div>`;
      return;
    }

    el.innerHTML = played.map(ev => {
      const fr     = franceComp(ev);
      const opp    = opponentIn(ev);
      const res    = resultOf(ev);
      const isHome = fr?.homeAway === 'home';
      const fScore = scoreVal(fr) ?? '–';
      const oScore = scoreVal(opp) ?? '–';
      const date   = new Date(ev.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      const pillClass  = res === 'win' ? 'pill-green' : res === 'draw' ? 'pill-yellow' : 'pill-red';
      const label      = res === 'win' ? 'W' : res === 'draw' ? 'D' : res === 'loss' ? 'L' : '–';
      const scoreColor = res === 'win' ? 'text-green-400' : res === 'draw' ? 'text-yellow-300' : 'text-red-400';

      return `
        <div class="glass rounded-xl px-5 py-4 flex items-center gap-4">
          <span class="${pillClass} text-xs font-black w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0">${label}</span>
          <div class="flex-1 min-w-0">
            <p class="text-white text-sm font-medium truncate">
              France <span class="text-white/30 font-normal">${isHome ? '(H)' : '(A)'}</span>
              <span class="text-white/30 mx-1">vs</span>
              ${opp?.team?.displayName || 'Unknown'}
            </p>
            <p class="text-white/30 text-xs mt-0.5">${date} · Group stage</p>
          </div>
          <p class="${scoreColor} font-bold tabular-nums text-base">${isHome ? fScore : oScore} – ${isHome ? oScore : fScore}</p>
        </div>
      `;
    }).join('');
  }

  function renderStandings(entries) {
    const el = document.getElementById('standings');
    if (!entries.length) {
      el.innerHTML = `<p class="text-white/35 italic">No standings data.</p>`;
      return;
    }

    const sorted = [...entries].sort((a, b) => getStat(a, 'R') - getStat(b, 'R'));

    el.innerHTML = `
      <div>
        <div class="flex text-white/25 text-[10px] uppercase tracking-wider pb-2 border-b border-white/10 mb-1">
          <span class="w-5 mr-3">#</span>
          <span class="flex-1">Team</span>
          <span class="w-6 text-center">P</span>
          <span class="w-8 text-center">Pts</span>
        </div>
        ${sorted.map((entry, i) => {
          const fr   = isFrance(entry.team?.displayName);
          const rank = getStat(entry, 'R') || i + 1;
          const pts  = getStat(entry, 'P');
          const gp   = getStat(entry, 'GP');
          const adv  = rank <= 2;

          return `
            <div class="flex items-center py-2 text-sm ${fr ? 'row-france' : ''}">
              <span class="w-5 mr-3 text-xs font-bold ${adv ? 'text-green-400' : 'text-white/25'}">${rank}</span>
              <span class="flex-1 truncate ${fr ? 'text-white font-bold' : 'text-white/55'}">${entry.team?.displayName || '—'}${fr ? ' 🇫🇷' : ''}</span>
              <span class="w-6 text-center text-xs text-white/40">${gp}</span>
              <span class="w-8 text-center font-bold ${fr ? 'text-white' : 'text-white/50'}">${pts}</span>
            </div>
          `;
        }).join('')}
        <p class="text-green-400/50 text-[10px] mt-3 tracking-wide">↑ Top 2 advance automatically</p>
      </div>
    `;
  }

  function renderWatchFor(entries, upcoming) {
    const el = document.getElementById('watch-for');
    const fr = entries.find(e => isFrance(e.team?.displayName));
    if (!fr) { el.innerHTML = `<p class="text-white/35 italic">No data.</p>`; return; }

    const rank      = getStat(fr, 'R') || 1;
    const pts       = getStat(fr, 'P');
    const gamesLeft = upcoming.length;
    let html = '';

    if (gamesLeft > 0) {
      html += `
        <p class="text-white/30 text-[10px] uppercase tracking-wider mb-4">Next result means…</p>
        <div class="space-y-4">
          <div class="flex gap-3 items-start">
            <span class="pill-green text-[10px] font-black px-2 py-0.5 rounded flex-shrink-0 mt-0.5">WIN</span>
            <div>
              <p class="text-white text-sm font-semibold">${pts + 3} pts</p>
              <p class="text-white/40 text-xs leading-snug">${pts + 3 >= 7 ? 'Almost certainly through' : pts + 3 >= 4 ? 'Strong position to advance' : 'Back in contention'}</p>
            </div>
          </div>
          <div class="flex gap-3 items-start">
            <span class="pill-yellow text-[10px] font-black px-2 py-0.5 rounded flex-shrink-0 mt-0.5">DRAW</span>
            <div>
              <p class="text-white text-sm font-semibold">${pts + 1} pt${pts + 1 !== 1 ? 's' : ''}</p>
              <p class="text-white/40 text-xs leading-snug">${gamesLeft > 1 ? 'Other results become crucial' : 'May not be enough'}</p>
            </div>
          </div>
          <div class="flex gap-3 items-start">
            <span class="pill-red text-[10px] font-black px-2 py-0.5 rounded flex-shrink-0 mt-0.5">LOSS</span>
            <div>
              <p class="text-white text-sm font-semibold">${pts} pt${pts !== 1 ? 's' : ''}</p>
              <p class="text-white/40 text-xs leading-snug">${gamesLeft > 1 ? 'Must win remaining games' : 'Elimination possible'}</p>
            </div>
          </div>
        </div>
      `;

      const others = entries
        .filter(e => !isFrance(e.team?.displayName))
        .sort((a, b) => getStat(a, 'R') - getStat(b, 'R'));

      if (others.length) {
        html += `
          <div class="mt-5 pt-4 border-t border-white/10">
            <p class="text-white/30 text-[10px] uppercase tracking-wider mb-2">Also in the group</p>
            ${others.map(e => `
              <div class="flex justify-between items-center py-1.5">
                <span class="text-white/55 text-sm">${e.team?.displayName}</span>
                <span class="text-white/35 text-xs">${getStat(e, 'P')} pts</span>
              </div>
            `).join('')}
          </div>
        `;
      }
    } else if (rank <= 2) {
      html = `
        <div class="py-2 text-center">
          <p class="text-green-400 font-bold text-lg">France are through 🎉</p>
          <p class="text-white/40 text-sm mt-2">Watch for their Round of 32 opponent</p>
        </div>
      `;
    } else if (rank === 3) {
      html = `
        <div class="py-2">
          <p class="text-yellow-300 font-semibold">Waiting on the group</p>
          <p class="text-white/40 text-sm mt-2">France need to be one of the 8 best third-place teams to advance.</p>
        </div>
      `;
    } else {
      html = `<p class="text-red-400/80 font-semibold py-2">France have been eliminated.</p>`;
    }

    el.innerHTML = html;
  }

  function showError() {
    ['next-match','standings','results','watch-for'].forEach(id => {
      document.getElementById(id).innerHTML =
        `<p class="text-red-400/60 text-sm">Could not load data — refresh to retry.</p>`;
    });
    document.getElementById('status-line').textContent = 'Data unavailable';
  }

  init();
</script>
</body>
</html>
