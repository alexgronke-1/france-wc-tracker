<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France World Cup Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-blue-800">France 2026 Tracker</h1>
        
        <!-- France Results Table -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3 border">Opponent</th>
                        <th class="p-3 border">Score</th>
                        <th class="p-3 border">Status</th>
                    </tr>
                </thead>
                <tbody id="match-data">
                    <!-- Data injected here -->
                    <tr>
                        <td class="p-3 border">Senegal</td>
                        <td class="p-3 border font-bold">3 - 1</td>
                        <td class="p-3 border text-green-600">Finished</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8">
            <h2 class="text-xl font-semibold mb-4">Group I Standings</h2>
            <div id="standings" class="bg-gray-50 p-4 rounded border">
                <p class="text-gray-600">Loading standings...</p>
            </div>
        </div>
    </div>

    <script>
        // Placeholder for future live integration
        // You can swap this with a fetch call to a free sports API
        const standings = [
            { team: "France", P: 1, W: 1, D: 0, L: 0, Pts: 3 },
            { team: "Senegal", P: 1, W: 0, D: 0, L: 1, Pts: 0 },
            { team: "Iraq", P: 0, W: 0, D: 0, L: 0, Pts: 0 },
            { team: "Norway", P: 0, W: 0, D: 0, L: 0, Pts: 0 }
        ];

        const standingsDiv = document.getElementById('standings');
        standingsDiv.innerHTML = `
            <ul class="space-y-2">
                ${standings.map(t => `<li class="flex justify-between"><span>${t.team}</span> <strong>${t.Pts} Pts</strong></li>`).join('')}
            </ul>
        `;
    </script>
</body>
</html>
